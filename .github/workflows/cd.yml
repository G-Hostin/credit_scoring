name: CD

# Déploiement continu : au push sur main (après merge), on revalide
# (tests + build) puis on déploie sur Hugging Face Spaces.
on:
  push:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.13
      - run: uv sync
      - run: uv run pytest -q

  build:
    name: Build Docker
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t credit-scoring-api .

  deploy:
    name: Déploiement Hugging Face
    needs: build         # ne déploie que si tests + build sont OK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installer huggingface_hub
        run: pip install --quiet huggingface_hub
      # On déploie avec la bibliothèque officielle HF : elle envoie les fichiers
      # et gère automatiquement les binaires (model.pkl) via le stockage LFS/Xet.
      - name: Déployer sur le Space Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          HfApi(token=os.environ["HF_TOKEN"]).upload_folder(
              folder_path=".",
              repo_id="g-hostin/credit_scoring",
              repo_type="space",
              commit_message="Deploy from GitHub Actions",
              ignore_patterns=[".git*", "notebooks/*", "tests/*", ".dockerignore"],
          )
          print("Deploiement termine.")
          PY
