name: CD

# Déploiement continu : au push sur main, on revalide (tests + build des images)
# puis on déclenche le déploiement des services sur Render via leurs deploy hooks.
on:
  push:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.13
      - run: uv sync
      - run: uv run pytest --cov=api --cov-report=term -q

  build:
    name: Build Docker
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build de l'image API
        run: docker build -t credit-scoring-api .
      - name: Build de l'image dashboard
        run: docker build -t credit-scoring-dashboard -f Dockerfile.dashboard .

  deploy:
    name: Déploiement Render
    needs: build         # ne déploie que si tests + build sont OK
    runs-on: ubuntu-latest
    steps:
      - name: Déclencher le déploiement de l'API
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"
      - name: Déclencher le déploiement du dashboard
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_DASHBOARD }}"
