name: CD

# Déploiement continu : au push sur main (après merge), on revalide
# (tests + build) puis on déploie sur Hugging Face Spaces.
on:
  push:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.13
      - run: uv sync
      - run: uv run pytest -q

  build:
    name: Build Docker
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t credit-scoring-api .

  deploy:
    name: Déploiement Hugging Face
    needs: build         # ne déploie que si tests + build sont OK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historique complet, nécessaire pour pousser vers HF
      - name: Pousser vers le Space Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force "https://g-hostin:${HF_TOKEN}@huggingface.co/spaces/g-hostin/credit_scoring" HEAD:main
