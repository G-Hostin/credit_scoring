# Stack local : l'API + une base PostgreSQL, dans deux conteneurs séparés.
# Lancement : `docker compose up --build`
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: credit
      POSTGRES_PASSWORD: credit          # identifiants de DEV uniquement (local)
      POSTGRES_DB: credit_scoring
    volumes:
      - pgdata:/var/lib/postgresql/data  # les données survivent aux redémarrages
    ports:
      - "5433:5432"                      # 5433 côté hôte (évite un PostgreSQL local sur 5432)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credit -d credit_scoring"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    environment:
      # L'API parle à la base via le nom de service "db" (DNS interne de Docker).
      DATABASE_URL: postgresql://credit:credit@db:5432/credit_scoring
    ports:
      - "8000:7860"                      # hôte 8000 -> conteneur 7860
    depends_on:
      db:
        condition: service_healthy       # l'API démarre quand la base est prête

volumes:
  pgdata:
